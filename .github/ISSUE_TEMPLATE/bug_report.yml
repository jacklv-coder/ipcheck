name: Bug report
description: Report incorrect detection, output, or client behavior.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include API keys, tokens, proxy passwords, cookies, or private hostnames.
  - type: input
    id: version
    attributes:
      label: ipcheck version
      placeholder: ipcheck 0.8.2
    validations:
      required: true
  - type: dropdown
    id: client
    attributes:
      label: Client
      options:
        - Codex
        - Claude Code
        - Custom endpoint
        - Multiple clients
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Linux
        - WSL
        - Git Bash
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include expected and actual behavior.
    validations:
      required: true
  - type: textarea
    id: report
    attributes:
      label: Redacted quick report
      description: Paste `ipcheck --quick --markdown` after removing private hostnames.
      render: markdown
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed credentials and private data from this report.
          required: true
