name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Run smoke tests
        run: bash test/smoke.sh

  npm-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate npm package
        run: |
          npm test
          npm pack --dry-run
